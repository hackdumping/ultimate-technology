{% load static %}
{% include 'metadata_connexion.html' %}
<body>
  {% include 'header.html' %}
  <main class="container-main">
    <section class="form-shell" style="max-width:560px">
      <div class="quick-links">
        <a class="quick-link" href="{% url 'login_vendeur' %}">Connexion</a>
        <a class="quick-link" href="{% url 'register_vendeur' %}">Inscription</a>
        <a class="quick-link" href="{% url 'recover_vendeur' %}">Recuperation</a>
      </div>
      <h1 class="section-title">Connexion vendeur</h1>
      <form method="POST" class="form-grid" style="margin-top:.5rem">
        {% csrf_token %}
        <p style="grid-column:1/-1;color:var(--danger);margin:0">{{ msg }}</p>
        <div class="form-field" style="grid-column:1/-1"><label>Code unique</label><input type="text" name="code" value="{{ donnees.code }}" required></div>
        <div class="form-field" style="grid-column:1/-1">
          <label>Mot de passe</label>
          <div class="password-wrap">
            <input id="loginPassword" type="password" name="password" value="{{ donnees.mdp }}" required>
            <button class="toggle-password" type="button" data-toggle-password="loginPassword" aria-label="Afficher ou masquer">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div style="grid-column:1/-1;display:flex;gap:.35rem;flex-wrap:wrap">
          <button type="submit" class="btn">Se connecter</button>
          <a class="btn ghost" href="{% url 'recover_vendeur' %}">Mot de passe oublie</a>
        </div>
      </form>
    </section>
  </main>
  {% include 'footer.html' %}
  <script src="{% static 'js/source.js' %}"></script>
</body>
</html>
