{% load static %}
{% include 'metadata.html' %}
<body>
  {% include 'header_vendeur.html' %}
  <main class="container-main">
    <section class="form-shell" style="margin-top:1rem">
      <div class="quick-links">
        <a class="quick-link" href="{% url 'vendeur' %}">Dashboard</a>
        <a class="quick-link" href="{% url 'profil' %}">Mon profil</a>
      </div>
      <h1 class="section-title">Ajouter un produit</h1>
      <p style="color:var(--success);margin:.15rem 0">{{ msg }}</p>
      <form method="POST" enctype="multipart/form-data" class="form-grid" id="productForm" style="margin-top:.35rem">
        {% csrf_token %}
        <div class="form-field"><label>Marque</label><input type="text" name="marque" required></div>
        <div class="form-field"><label>Modele</label><input type="text" name="model" required></div>
        <div class="form-field"><label>CPU</label><input type="text" name="cpu" required></div>
        <div class="form-field"><label>RAM</label><input type="text" name="ram" required></div>
        <div class="form-field"><label>Stockage</label><input type="text" name="stockage" required></div>
        <div class="form-field"><label>Carte graphique</label><input type="text" name="graphic"></div>
        <div class="form-field" style="grid-column:1/-1"><label>Description</label><textarea name="description" required></textarea></div>
        <div class="form-field"><label>Ancien prix</label><input type="number" name="ancien_prix" value="0"></div>
        <div class="form-field"><label>Nouveau prix</label><input type="number" name="nouveau_prix" required></div>
        <div class="form-field"><label><input type="checkbox" id="est_promo" name="est_promo"> Produit en promotion</label></div>
        <div class="form-field" id="promo_wrap"><label>Prix promo</label><input type="number" name="prix_promo" value="0"></div>
        <div class="form-field"><label><input type="checkbox" name="est_vendue"> Marquer en rupture</label></div>
        <div class="form-field"><label>Type</label><select name="est_pc"><option value="True">Ordinateur</option><option value="False">Accessoire</option></select></div>
        <div class="form-field"><label>Image principale</label><input type="file" name="image" accept="image/*"></div>
        <div class="form-field"><label>Image 2</label><input type="file" name="image2" accept="image/*"></div>
        <div class="form-field"><label>Image 3</label><input type="file" name="image3" accept="image/*"></div>
        <div style="grid-column:1/-1;display:flex;gap:.35rem;flex-wrap:wrap"><button class="btn" type="submit">Publier</button><a class="btn ghost" href="{% url 'vendeur' %}">Annuler</a></div>
      </form>
    </section>
  </main>
  {% include 'footer.html' %}
  <script src="{% static 'js/source.js' %}"></script>
  <script>
    const ep = document.getElementById('est_promo');
    const pw = document.getElementById('promo_wrap');
    function sync(){ pw.style.display = ep.checked ? 'block' : 'none'; }
    ep.addEventListener('change', sync); sync();
  </script>
</body>
</html>
