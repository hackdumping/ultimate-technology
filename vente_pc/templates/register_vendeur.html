{% load static %}
{% include 'metadata_connexion.html' %}
<body>
  {% include 'header.html' %}
  <main class="container-main">
    <section class="form-shell" style="max-width:980px">
      <div class="quick-links">
        <a class="quick-link" href="{% url 'login_vendeur' %}">Connexion</a>
        <a class="quick-link" href="{% url 'register_vendeur' %}">Inscription</a>
        <a class="quick-link" href="{% url 'recover_vendeur' %}">Recuperation</a>
      </div>
      <h1 class="section-title">Creer un compte vendeur</h1>
      <p style="color:var(--danger);margin:.1rem 0">{{ msg }}</p>
      <p style="color:var(--danger);margin:.1rem 0">{{ msg2 }}</p>
      <form method="POST" enctype="multipart/form-data" class="form-grid" style="margin-top:.4rem">
        {% csrf_token %}
        <div class="form-field"><label>Nom societe</label><input type="text" name="company" value="{{ donnees.nom }}" required></div>
        <div class="form-field"><label>WhatsApp</label><input type="tel" name="whatsapp" value="{{ donnees.tel }}" required></div>
        <div class="form-field"><label>Email</label><input type="email" name="email" value="{{ donnees.email }}" required></div>
        <div class="form-field"><label>Frais livraison</label><input type="number" name="frais" value="{{ donnees.frais }}" min="0" required></div>
        <div class="form-field">
          <label>Mot de passe</label>
          <div class="password-wrap">
            <input id="registerPassword" type="password" name="password" value="{{ donnees.mdp }}" required>
            <button class="toggle-password" type="button" data-toggle-password="registerPassword" aria-label="Afficher ou masquer">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-field">
          <label>Confirmer mot de passe</label>
          <div class="password-wrap">
            <input id="registerConfirmPassword" type="password" name="confirm" value="{{ donnees.mdp2 }}" required>
            <button class="toggle-password" type="button" data-toggle-password="registerConfirmPassword" aria-label="Afficher ou masquer">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-field"><label>Pays</label><input type="text" name="pays" value="{{ donnees.pays }}" required></div>
        <div class="form-field"><label>Ville</label><input type="text" name="ville" value="{{ donnees.ville }}" required></div>
        <div class="form-field"><label>Forfait</label><select name="plan" required>{% for forfait in forfaits %}<option value="{{ forfait.nom }}">{{ forfait.nom }} — {{ forfait.prix }} XAF/mois</option>{% endfor %}</select></div>
        <div class="form-field"><label>Logo</label><input type="file" name="logo" accept=".jpg,.jpeg,.png,.svg"></div>
        <div style="grid-column:1/-1;display:flex;gap:.35rem;flex-wrap:wrap"><button class="btn" type="submit">Creer mon compte</button><a class="btn ghost" href="{% url 'login_vendeur' %}">J'ai deja un compte</a></div>
      </form>
    </section>
  </main>
  {% include 'footer.html' %}
  <script src="{% static 'js/source.js' %}"></script>
</body>
</html>
