{% load static %}
{% include 'metadata.html' %}
<body>
  {% include 'header_vendeur.html' %}
  <main class="container-main">
    <section class="form-shell" style="margin-top:1rem">
      <div class="quick-links">
        <a class="quick-link" href="{% url 'vendeur' %}">Dashboard</a>
        <a class="quick-link" href="{% url 'ajouter_produit' %}">Ajouter produit</a>
      </div>
      <h1 class="section-title">Editer le produit</h1>
      <form method="POST" enctype="multipart/form-data" class="form-grid" id="productForm" style="margin-top:.35rem">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ produit.id }}">
        <div class="form-field"><label>Marque</label><input type="text" name="marque" value="{{ produit.marque }}" required></div>
        <div class="form-field"><label>Modele</label><input type="text" name="model" value="{{ produit.model }}" required></div>
        <div class="form-field"><label>CPU</label><input type="text" name="cpu" value="{{ produit.cpu }}" required></div>
        <div class="form-field"><label>RAM</label><input type="text" name="ram" value="{{ produit.ram }}" required></div>
        <div class="form-field"><label>Stockage</label><input type="text" name="stockage" value="{{ produit.stockage }}" required></div>
        <div class="form-field"><label>Carte graphique</label><input type="text" name="graphic" value="{{ produit.graphic }}"></div>
        <div class="form-field" style="grid-column:1/-1"><label>Description</label><textarea name="description" required>{{ produit.description }}</textarea></div>
        <div class="form-field"><label>Ancien prix</label><input type="number" name="ancien_prix" value="{{ produit.ancien_prix }}"></div>
        <div class="form-field"><label>Nouveau prix</label><input type="number" name="nouveau_prix" value="{{ produit.nouveau_prix }}" required></div>
        <div class="form-field"><label><input type="checkbox" id="est_promo" name="est_promo" {% if produit.est_promo %}checked{% endif %}> Produit en promotion</label></div>
        <div class="form-field" id="promo_wrap"><label>Prix promo</label><input type="number" name="prix_promo" value="{{ produit.prix_promo }}"></div>
        <div class="form-field"><label><input type="checkbox" name="est_vendue" {% if produit.est_vendue %}checked{% endif %}> Marquer en rupture</label></div>
        <div class="form-field"><label>Type</label><select name="est_pc"><option value="True" {% if produit.est_pc %}selected{% endif %}>Ordinateur</option><option value="False" {% if not produit.est_pc %}selected{% endif %}>Accessoire</option></select></div>
        <div class="form-field"><label>Image principale</label><input type="file" name="image" accept="image/*"></div>
        <div class="form-field"><label>Image 2</label><input type="file" name="image2" accept="image/*"></div>
        <div class="form-field"><label>Image 3</label><input type="file" name="image3" accept="image/*"></div>
        <div class="form-field" style="grid-column:1/-1;display:flex;gap:.35rem;flex-wrap:wrap">
          {% if produit.image %}<img src="{{ produit.image.url }}" alt="1" style="width:105px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">{% endif %}
          {% if produit.image2 %}<img src="{{ produit.image2.url }}" alt="2" style="width:105px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">{% endif %}
          {% if produit.image3 %}<img src="{{ produit.image3.url }}" alt="3" style="width:105px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">{% endif %}
        </div>
        <div style="grid-column:1/-1;display:flex;gap:.35rem;flex-wrap:wrap">
          <button class="btn" type="submit" name="action" value="Enregistrer">Enregistrer</button>
          <button class="btn ghost" type="submit" name="action" value="Supprimer" onclick="return confirm('Supprimer ce produit ?')">Supprimer</button>
          <a class="btn ghost" href="{% url 'vendeur' %}">Retour</a>
        </div>
      </form>
    </section>
  </main>
  {% include 'footer.html' %}
  <script src="{% static 'js/source.js' %}"></script>
  <script>
    const ep = document.getElementById('est_promo');
    const pw = document.getElementById('promo_wrap');
    function sync(){ pw.style.display = ep.checked ? 'block' : 'none'; }
    ep.addEventListener('change', sync); sync();
  </script>
</body>
</html>
