{% extends 'squelette.html' %}
{% block content %}
<section class="section-block" id="home" style="margin-top:1rem">
  <h1 class="section-title">Promotions en cours</h1>
  <p class="section-subtitle">Retrouvez les meilleures reductions disponibles actuellement.</p>
</section>

<div class="controls" id="shop">
  <div>
    <label>Categorie</label>
    <select id="categoryFilter"><option value="all">Toutes</option></select>
  </div>
  <div>
    <label>Pays</label>
    <select id="countryFilter"><option value="all">Tous</option></select>
  </div>
  <div>
    <label>Ville</label>
    <select id="cityFilter"><option value="all">Toutes</option></select>
  </div>
  <div>
    <label>Trier</label>
    <select id="sortSelect">
      <option value="popular">Pertinence</option>
      <option value="price-asc">Prix croissant</option>
      <option value="price-desc">Prix decroissant</option>
      <option value="name-asc">Nom A-Z</option>
    </select>
  </div>
  <div>
    <label>Recherche</label>
    <input id="miniSearch" placeholder="Rechercher une promotion">
  </div>
  <div>
    <label>Budget max</label>
    <input id="priceRange" type="range" min="0" max="1000000" step="5000" value="1000000">
    <div id="priceLabel" style="font-size:.62rem;color:var(--muted);margin-top:.12rem">Jusqu'a -</div>
  </div>
</div>

<div class="grid" id="products" aria-live="polite"></div>
<a href="#home" class="scroll-btn">↑</a>
{% endblock %}
