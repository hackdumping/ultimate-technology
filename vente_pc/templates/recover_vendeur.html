{% load static %}
{% include 'metadata_connexion.html' %}
<body>
  {% include 'header.html' %}
  <main class="container-main">
    <section class="form-shell" style="max-width:560px">
      <div class="quick-links">
        <a class="quick-link" href="{% url 'login_vendeur' %}">Connexion</a>
        <a class="quick-link" href="{% url 'register_vendeur' %}">Inscription</a>
      </div>
      <h1 class="section-title">Recuperation du compte</h1>
      <p style="color:var(--danger);margin:.1rem 0">{{ msg2 }}</p>
      {% if msg %}
      <p class="auth-notice-success">{{ msg }}</p>
      {% endif %}
      <form method="POST" class="form-grid" style="margin-top:.45rem">
        {% csrf_token %}
        <div class="form-field" style="grid-column:1/-1"><label>Email du compte</label><input type="email" name="email" value="{{ donnees.email }}" required></div>
        <div style="grid-column:1/-1;display:flex;gap:.35rem;flex-wrap:wrap"><button type="submit" class="btn">Envoyer</button><a class="btn ghost" href="{% url 'login_vendeur' %}">Retour connexion</a></div>
      </form>
    </section>
  </main>
  {% include 'footer.html' %}
  <script src="{% static 'js/source.js' %}"></script>
</body>
</html>
