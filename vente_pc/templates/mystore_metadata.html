{% load static %}
<!doctype html>
<html lang="fr" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  {% if test_utl_detail|default:False %}
  <meta property="og:title" content="{{ marque }} {{ model }}">
  <meta property="og:description" content="{{ cpu }} | RAM {{ ram }} | {{ stockage }} | {{ graphic }}">
  <meta property="og:image" content="{{ url_image }}">
  {% else %}
  <meta property="og:title" content="{{ vendeur.nom }} | Boutique partenaire">
  <meta property="og:description" content="Boutique partenaire Ultimate-Technology">
  <meta property="og:image" content="{{ vendeur.logo.url }}">
  {% endif %}
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ultimate-Technology">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">

  <title>{% block title %}{{ vendeur.nom }} | Ultimate-Technology{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link rel="icon" href="{% static 'favicon/favicon.ico' %}" type="image/x-icon">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
