{% load static %}
<header class="site-header">
  <div class="container-main nav-top">
    <a class="brand" href="{% url 'mystore_index' id=vendeur.id %}">
      <span class="brand-logo partner-brand-logo"><img src="{{ vendeur.logo.url }}" alt="{{ vendeur.nom }}"></span>
      <span>
        <strong class="brand-title">{{ vendeur.nom }}</strong>
        <small class="brand-sub">Boutique partenaire</small>
      </span>
    </a>

    <div class="nav-search">
      <i class="fas fa-search"></i>
      <input id="searchInput" placeholder="Rechercher dans la boutique">
    </div>

    <div class="nav-actions">
      <button id="themeToggle" class="icon-btn" type="button">◐</button>
      <button class="icon-btn mobile-menu-btn" type="button"><i class="fas fa-bars"></i></button>
      <button id="cartBtn" class="icon-btn" type="button">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount" class="cart-count" style="display:none">0</span>
      </button>
    </div>
  </div>

  <div class="container-main nav-links">
    <a class="nav-pill" href="{% url 'mystore_index' id=vendeur.id %}">Accueil</a>
    <a class="nav-pill" href="{% url 'mystore_index' id=vendeur.id %}#shop">Catalogue</a>
    <a class="nav-pill {% if request.resolver_match.url_name == 'mystore_promotion' %}active{% endif %}" href="{% url 'mystore_promotion' id=vendeur.id %}">Promotions</a>
    <a class="nav-pill" href="https://wa.me/{{ vendeur.tel }}" target="_blank" rel="noopener">Contacter vendeur</a>
  </div>
</header>

<nav id="mobileNav" class="mobile-nav">
  <button id="closeMobileNav" class="icon-btn mobile-nav-close" type="button"><i class="fas fa-times"></i></button>
  <a class="nav-pill" href="{% url 'mystore_index' id=vendeur.id %}">Accueil</a>
  <a class="nav-pill" href="{% url 'mystore_index' id=vendeur.id %}#shop">Catalogue</a>
  <a class="nav-pill" href="{% url 'mystore_promotion' id=vendeur.id %}">Promotions</a>
  <a class="nav-pill" href="https://wa.me/{{ vendeur.tel }}" target="_blank" rel="noopener">Contacter vendeur</a>
</nav>
