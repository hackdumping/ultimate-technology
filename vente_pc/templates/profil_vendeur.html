{% load static %}
{% include 'metadata.html' %}
<body>
  {% include 'header_vendeur.html' %}
  <main class="container-main">
    <section class="form-shell" style="margin-top:1rem">
      <div class="quick-links">
        <a class="quick-link" href="{% url 'vendeur' %}">Dashboard</a>
        <a class="quick-link" href="{% url 'ajouter_produit' %}">Ajouter produit</a>
      </div>
      <div style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-bottom:.45rem">
        <img src="{{ vendeur.logo.url }}" alt="{{ vendeur.nom }}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:1px solid var(--line)">
        <div>
          <h1 class="section-title" style="margin:0">Profil vendeur</h1>
          <p class="section-subtitle">Forfait {{ vendeur.forfait.nom }} — {{ vendeur.forfait.prix }} XAF/mois — {{ vendeur.jours }} jours restants</p>
        </div>
      </div>
      <p style="color:var(--success);margin:0">{{ msg }}</p>
      <form method="POST" enctype="multipart/form-data" class="form-grid" style="margin-top:.45rem">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ vendeur.id }}">
        <div class="form-field"><label>Nom societe</label><input type="text" name="nom" value="{{ vendeur.nom }}" required></div>
        <div class="form-field"><label>Email</label><input type="email" name="email" value="{{ vendeur.email }}" required></div>
        <div class="form-field"><label>WhatsApp</label><input type="text" name="tel" value="{{ vendeur.tel }}" required></div>
        <div class="form-field"><label>Frais livraison</label><input type="number" name="frais" value="{{ vendeur.frais }}" required></div>
        <div class="form-field">
          <label>Mot de passe</label>
          <div class="password-wrap">
            <input id="profilePassword" type="password" name="mdp" value="{{ vendeur.mdp }}" required>
            <button class="toggle-password" type="button" data-toggle-password="profilePassword" aria-label="Afficher ou masquer">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-field"><label>Pays</label><input type="text" name="pays" value="{{ vendeur.pays.nom }}" required></div>
        <div class="form-field"><label>Ville</label><input type="text" name="ville" value="{{ vendeur.ville.nom }}" required></div>
        <div class="form-field"><label>Logo</label><input type="file" name="logo"></div>
        <div style="grid-column:1/-1"><button class="btn" type="submit">Enregistrer</button></div>
      </form>
    </section>
  </main>
  {% include 'footer.html' %}
  <script src="{% static 'js/source.js' %}"></script>
</body>
</html>
