{% load static %}
{% include 'mystore_metadata.html' %}
<body>
  {% include 'mystore_header.html' %}

  <main class="container-main" id="main">
    {% block content %}{% endblock %}

    <aside id="cartSidebar" class="cart-sidebar" aria-hidden="true">
      <div class="cart-header">
        <h3 style="margin:0">Mon panier</h3>
        <button id="closeCart" class="icon-btn" aria-label="Fermer"><i class="fas fa-times"></i></button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div>
        <div style="display:flex;justify-content:space-between"><span>Sous-total</span><strong id="subtotal">0 XAF</strong></div>
        <div style="display:flex;justify-content:space-between;margin-top:.2rem"><span>Livraison ({{ vendeur.ville.nom }})</span><strong id="shipping">{{ vendeur.frais }} XAF</strong></div>
        <div style="display:flex;justify-content:space-between;margin-top:.3rem"><span>Total</span><strong id="total">0 XAF</strong></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.6rem">
          <button id="checkoutBtn" class="btn">Commander</button>
          <button id="clearCartBtn" class="btn ghost">Vider</button>
        </div>
      </div>
    </aside>

    <div id="overlay2" class="overlay"></div>
    <div id="checkoutModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:.1rem 0">Finaliser la commande</h3>
        <button id="closeCheckout" class="icon-btn" aria-label="Fermer"><i class="fas fa-times"></i></button>
      </div>
      <form id="checkoutForm" style="display:grid;gap:.45rem;margin-top:.6rem">
        <input name="name" placeholder="Nom complet" required>
        <input name="email" type="email" placeholder="Email" required>
        <input name="phone" placeholder="WhatsApp" required>
        <input name="address" placeholder="Adresse de livraison" required>
        <input id="checkoutSubmitBtn" type="submit" class="btn" value="Envoyer la commande">
      </form>

      <form method="POST" id="newForm" action="{% url 'mystore_index' id=vendeur.id %}" style="display:none">
        {% csrf_token %}
        <input type="text" name="name" id="name">
        <input type="text" name="email" id="email">
        <input type="text" name="phone" id="phone">
        <input type="text" name="address" id="address">
        <input type="text" name="data" id="dataField">
        <input type="text" name="total" id="totalField">
      </form>
    </div>
  </main>

  {% include 'footer.html' %}
  <script src="{% static 'js/source.js' %}"></script>
  <script>
    (function () {
      const money = (n) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'XAF', maximumFractionDigits: 0 }).format(Number(n || 0));
      const productsRaw = {{ produits|default:'[]'|safe }};
      const PRODUCTS = (productsRaw || []).map((el) => ({
        id: el.id,
        vendeur: el.vendeur_id || '{{ vendeur.id }}',
        name: `${el.marque} ${el.model}`,
        brand: el.marque,
        price: Number(el.nouveau_prix || 0),
        oldPrice: Number(el.ancien_prix || 0),
        promo: Number(el.prix_promo || 0),
        sold: String(el.est_vendue) === 'True',
        image: el.image,
        cpu: el.cpu,
        ram: el.ram,
        stockage: el.stockage,
        graphic: el.graphic,
        city: el.ville,
        whatsapp: el.url || '#'
      }));

      const listEl = document.getElementById('products');
      const categoryEl = document.getElementById('categoryFilter');
      const sortEl = document.getElementById('sortSelect');
      const rangeEl = document.getElementById('priceRange');
      const rangeLabel = document.getElementById('priceLabel');
      const searchMain = document.getElementById('searchInput');
      const searchMini = document.getElementById('miniSearch');

      let filtered = PRODUCTS.slice();
      const cartKey = 'ut_cart_store_{{ vendeur.id }}';
      let cart = loadCart();
      const shippingCost = Number('{{ vendeur.frais }}' || 0);

      function showOrderNotice(message, isError = false) {
        const n = document.createElement('div');
        const isDark = document.body.classList.contains('dark');
        n.textContent = message;
        n.style.position = 'fixed';
        n.style.right = '12px';
        n.style.top = '88px';
        n.style.zIndex = '2000';
        n.style.padding = '10px 12px';
        n.style.borderRadius = '10px';
        n.style.border = isError ? '1px solid #8e1d1d' : (isDark ? '1px solid #2f9f68' : '1px solid #9fdab8');
        n.style.background = isError ? '#c62828' : (isDark ? '#173726' : '#e7f8ef');
        n.style.color = isError ? '#ffffff' : (isDark ? '#d5f7e5' : '#0f5132');
        n.style.boxShadow = 'var(--shadow)';
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3200);
      }

      function finalPrice(p) { return p.promo > 0 ? p.promo : p.price; }
      function detailUrl(p) { return `/vendeur/mystore/${p.vendeur}/${p.id}/`; }
      function loadCart() { try { return JSON.parse(localStorage.getItem(cartKey) || '{}'); } catch (_) { return {}; } }
      function saveCart() { localStorage.setItem(cartKey, JSON.stringify(cart)); }

      const url = new URL(window.location.href);
      const hasMailError = url.searchParams.get('mail_error') === '1';
      if (hasMailError) {
        sessionStorage.removeItem('ut_checkout_submitted');
        showOrderNotice('Connexion requise', true);
        url.searchParams.delete('mail_error');
        history.replaceState({}, '', `${url.pathname}${url.search}${url.hash}`);
      }

      // Si une commande vient d'etre envoyee, notifier et vider le panier automatiquement.
      if (!hasMailError && sessionStorage.getItem('ut_checkout_submitted') === cartKey) {
        cart = {};
        saveCart();
        sessionStorage.removeItem('ut_checkout_submitted');
        showOrderNotice('Commande envoyee avec succes.');
      }

      function initFilters() {
        if (categoryEl) [...new Set(PRODUCTS.map((p) => p.brand))].sort().forEach((v) => categoryEl.insertAdjacentHTML('beforeend', `<option value="${v}">${v}</option>`));
        if (rangeEl && PRODUCTS.length) {
          const max = Math.max(...PRODUCTS.map((p) => finalPrice(p)));
          rangeEl.max = String(max);
          rangeEl.value = String(max);
          if (rangeLabel) rangeLabel.textContent = `Jusqu'a ${money(max)}`;
        }
      }

      function renderProducts(items) {
        if (!listEl) return;
        if (!items.length) {
          listEl.innerHTML = '<div class="card" style="padding:1rem">Aucun produit trouve.</div>';
          return;
        }
        listEl.innerHTML = items.map((p) => `
          <article class="card" data-id="${p.id}">
            <div class="card-media">
              ${p.promo > 0 ? '<span class="badge-promo">Promo</span>' : ''}
              <a href="${detailUrl(p)}"><img loading="lazy" src="${p.image}" alt="${p.name}"></a>
            </div>
            <div class="card-body">
              <h3 class="card-title">${p.name}</h3>
              <p class="card-specs">${p.cpu} • ${p.ram} • ${p.stockage}</p>
              <div class="card-price">${money(finalPrice(p))}</div>
              <div class="card-price-old">${p.promo > 0 ? money(p.price) : (p.oldPrice ? money(p.oldPrice) : '')}</div>
              <div class="card-meta">${p.sold ? 'En rupture' : 'En stock'} • ${p.city || ''}</div>
              <div class="card-actions">
                <button class="btn add-to-cart" data-id="${p.id}" ${p.sold ? 'disabled' : ''}>Ajouter</button>
                <a class="btn ghost" href="${detailUrl(p)}">Details</a>
                <a class="btn whatsapp" href="${p.whatsapp}" target="_blank" rel="noopener" aria-label="Commander sur WhatsApp"><i class="fab fa-whatsapp wa-icon"></i><span class="wa-text">WhatsApp</span></a>
              </div>
            </div>
          </article>
        `).join('');
      }

      function applyFilters() {
        const q = ((searchMini && searchMini.value) || (searchMain && searchMain.value) || '').toLowerCase().trim();
        const brand = categoryEl ? categoryEl.value : 'all';
        const max = rangeEl ? Number(rangeEl.value || 0) : Number.MAX_SAFE_INTEGER;

        filtered = PRODUCTS.filter((p) => {
          if (brand !== 'all' && p.brand !== brand) return false;
          if (finalPrice(p) > max) return false;
          if (!q) return true;
          return (`${p.name} ${p.cpu} ${p.ram} ${p.stockage} ${p.graphic}`).toLowerCase().includes(q);
        });

        const sort = sortEl ? sortEl.value : 'popular';
        if (sort === 'price-asc') filtered.sort((a, b) => finalPrice(a) - finalPrice(b));
        if (sort === 'price-desc') filtered.sort((a, b) => finalPrice(b) - finalPrice(a));
        if (sort === 'name-asc') filtered.sort((a, b) => a.name.localeCompare(b.name));
        renderProducts(filtered);
      }

      const cartBtn = document.getElementById('cartBtn');
      const cartSidebar = document.getElementById('cartSidebar');
      const closeCartBtn = document.getElementById('closeCart');
      const cartItemsEl = document.getElementById('cartItems');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('total');
      const cartCountEl = document.getElementById('cartCount');
      const clearCartBtn = document.getElementById('clearCartBtn');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const overlay2 = document.getElementById('overlay2');
      const checkoutModal = document.getElementById('checkoutModal');
      const closeCheckout = document.getElementById('closeCheckout');
      const checkoutForm = document.getElementById('checkoutForm');
      const checkoutSubmitBtn = document.getElementById('checkoutSubmitBtn');
      const submitDefaultLabel = checkoutSubmitBtn ? checkoutSubmitBtn.value : 'Envoyer la commande';

      function setSubmitLoading(isLoading) {
        if (!checkoutSubmitBtn) return;
        checkoutSubmitBtn.disabled = isLoading;
        checkoutSubmitBtn.value = isLoading ? 'Envoi en cours...' : submitDefaultLabel;
        checkoutSubmitBtn.style.opacity = isLoading ? '0.75' : '1';
        checkoutSubmitBtn.style.cursor = isLoading ? 'not-allowed' : '';
      }

      if (hasMailError) {
        setSubmitLoading(false);
        if (overlay2 && checkoutModal) {
          overlay2.classList.add('active');
          checkoutModal.classList.add('open');
        }
      }

      function cartTotal() {
        return Object.values(cart).reduce((sum, row) => {
          const p = PRODUCTS.find((x) => x.id === row.id);
          return p ? sum + finalPrice(p) * row.qty : sum;
        }, 0);
      }

      function renderCart() {
        const rows = Object.values(cart);
        if (!rows.length) {
          cartItemsEl.innerHTML = '<p style="color:var(--muted)">Votre panier est vide.</p>';
        } else {
          cartItemsEl.innerHTML = rows.map((row) => {
            const p = PRODUCTS.find((x) => x.id === row.id);
            if (!p) return '';
            return `
              <div class="cart-item">
                <img src="${p.image}" alt="${p.name}">
                <div>
                  <div style="font-size:.72rem;font-weight:800">${p.name}</div>
                  <div style="font-size:.64rem;color:var(--muted)">${money(finalPrice(p))}</div>
                  <div class="qty">
                    <button class="qty-dec" data-id="${p.id}">-</button>
                    <span>${row.qty}</span>
                    <button class="qty-inc" data-id="${p.id}">+</button>
                  </div>
                </div>
                <button class="icon-btn cart-del" data-id="${p.id}"><i class="fas fa-trash"></i></button>
              </div>
            `;
          }).join('');
        }
        const subtotal = cartTotal();
        const total = subtotal + (subtotal > 0 ? shippingCost : 0);
        subtotalEl.textContent = money(subtotal);
        totalEl.textContent = money(total);
        const count = rows.reduce((s, r) => s + r.qty, 0);
        cartCountEl.style.display = count ? 'grid' : 'none';
        cartCountEl.textContent = count;
      }

      function openCart() { cartSidebar.classList.add('open'); }
      function closeCart() { cartSidebar.classList.remove('open'); }

      document.addEventListener('click', (e) => {
        const clickedInsideCart = cartSidebar && cartSidebar.contains(e.target);
        const clickedCartToggle = cartBtn && (cartBtn === e.target || cartBtn.contains(e.target));
        const clickedCheckoutModal = checkoutModal && checkoutModal.contains(e.target);
        if (
          cartSidebar &&
          cartSidebar.classList.contains('open') &&
          !clickedInsideCart &&
          !clickedCartToggle &&
          !clickedCheckoutModal
        ) {
          closeCart();
        }

        const add = e.target.closest('.add-to-cart');
        if (add) {
          const id = add.dataset.id;
          cart[id] = cart[id] || { id, qty: 0 };
          cart[id].qty += 1;
          saveCart(); renderCart(); openCart();
          return;
        }
        const inc = e.target.closest('.qty-inc');
        if (inc) { cart[inc.dataset.id].qty += 1; saveCart(); renderCart(); return; }
        const dec = e.target.closest('.qty-dec');
        if (dec) { cart[dec.dataset.id].qty = Math.max(1, cart[dec.dataset.id].qty - 1); saveCart(); renderCart(); return; }
        const del = e.target.closest('.cart-del');
        if (del) { delete cart[del.dataset.id]; saveCart(); renderCart(); }
      });

      if (cartBtn) cartBtn.addEventListener('click', openCart);
      if (closeCartBtn) closeCartBtn.addEventListener('click', closeCart);
      if (clearCartBtn) clearCartBtn.addEventListener('click', () => { cart = {}; saveCart(); renderCart(); });
      if (checkoutBtn) checkoutBtn.addEventListener('click', () => { if (Object.keys(cart).length) { overlay2.classList.add('active'); checkoutModal.classList.add('open'); } });
      if (closeCheckout) closeCheckout.addEventListener('click', () => { overlay2.classList.remove('active'); checkoutModal.classList.remove('open'); });
      if (overlay2) overlay2.addEventListener('click', () => { overlay2.classList.remove('active'); checkoutModal.classList.remove('open'); });

      if (checkoutForm) {
        checkoutForm.addEventListener('submit', (e) => {
          e.preventDefault();
          if (checkoutSubmitBtn && checkoutSubmitBtn.disabled) return;
          setSubmitLoading(true);
          const fd = new FormData(checkoutForm);
          document.getElementById('name').value = fd.get('name') || '';
          document.getElementById('email').value = fd.get('email') || '';
          document.getElementById('phone').value = fd.get('phone') || '';
          document.getElementById('address').value = fd.get('address') || '';
          const payload = {};
          let i = 0;
          Object.values(cart).forEach((r) => { payload[i] = { id: r.id, qty: r.qty }; i += 1; });
          document.getElementById('dataField').value = JSON.stringify(payload);
          document.getElementById('totalField').value = String(cartTotal() + shippingCost);
          sessionStorage.setItem('ut_checkout_submitted', cartKey);
          document.getElementById('newForm').submit();
        });
      }

      [categoryEl, sortEl, rangeEl, searchMain, searchMini].forEach((el) => {
        if (!el) return;
        const ev = el.tagName === 'SELECT' || el.type === 'range' ? 'change' : 'input';
        el.addEventListener(ev, applyFilters);
      });
      if (rangeEl && rangeLabel) rangeEl.addEventListener('input', () => { rangeLabel.textContent = `Jusqu'a ${money(rangeEl.value)}`; });

      initFilters();
      renderProducts(filtered);
      renderCart();
    })();
  </script>
</body>
</html>
